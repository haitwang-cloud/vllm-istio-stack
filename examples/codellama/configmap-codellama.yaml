apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: vllm-system
data:
  # Code Llama 7B Instruct model
  model: "codellama/CodeLlama-7b-Instruct-hf"
  tensor_parallel_size: "1"
  max_model_len: "16384"  # Code Llama supports longer context
  max_num_batched_tokens: "16384"
  max_num_seqs: "128"
  
  # Server configuration
  host: "0.0.0.0"
  port: "8000"
  
  # Code Llama specific optimizations
  enable_chunked_prefill: "true"
  max_num_on_the_fly: "4"  # Lower for code generation
  
  # OpenAI API compatibility
  served_model_name: "codellama-7b-instruct"
  
  # GPU configuration for Code Llama 7B
  gpu_memory_utilization: "0.90"
  
  # Logging
  log_level: "info"
  
  # Code generation parameters
  default_temperature: "0.1"
  default_top_p: "0.95"
  default_max_tokens: "512"