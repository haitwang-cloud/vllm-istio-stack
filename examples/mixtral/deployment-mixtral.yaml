# Multi-GPU deployment for Mixtral models
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm-system
  labels:
    app: vllm
    version: v1
    model: mixtral
spec:
  replicas: 1  # Single replica due to resource requirements
  selector:
    matchLabels:
      app: vllm
      version: v1
  template:
    metadata:
      labels:
        app: vllm
        version: v1
        model: mixtral
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        accelerator: nvidia-tesla-v100  # Adjust based on your GPU nodes
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1"  # Use 2 GPUs
        - name: MODEL
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: model
        - name: TENSOR_PARALLEL_SIZE
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: tensor_parallel_size
        - name: MAX_MODEL_LEN
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: max_model_len
        - name: GPU_MEMORY_UTILIZATION
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: gpu_memory_utilization
        - name: SERVED_MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: served_model_name
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model
        - $(MODEL)
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --tensor-parallel-size
        - $(TENSOR_PARALLEL_SIZE)
        - --max-model-len
        - $(MAX_MODEL_LEN)
        - --gpu-memory-utilization
        - $(GPU_MEMORY_UTILIZATION)
        - --served-model-name
        - $(SERVED_MODEL_NAME)
        - --enable-chunked-prefill
        - --disable-log-requests
        - --trust-remote-code
        - --max-num-seqs
        - "64"
        resources:
          requests:
            memory: "64Gi"
            cpu: "16"
            nvidia.com/gpu: "2"  # Request 2 GPUs
          limits:
            memory: "96Gi"
            cpu: "32"
            nvidia.com/gpu: "2"  # Limit to 2 GPUs
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300  # Mixtral takes much longer to load
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 15
          failureThreshold: 5
        volumeMounts:
        - name: model-cache
          mountPath: /home/vllm/.cache
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: "200Gi"  # Large cache for Mixtral
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "16Gi"