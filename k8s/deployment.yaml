apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm-system
  labels:
    app: vllm
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      version: v1
  template:
    metadata:
      labels:
        app: vllm
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest  # Replace with your custom image
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: MODEL
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: model
        - name: TENSOR_PARALLEL_SIZE
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: tensor_parallel_size
        - name: MAX_MODEL_LEN
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: max_model_len
        - name: GPU_MEMORY_UTILIZATION
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: gpu_memory_utilization
        - name: SERVED_MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: vllm-config
              key: served_model_name
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model
        - $(MODEL)
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --tensor-parallel-size
        - $(TENSOR_PARALLEL_SIZE)
        - --max-model-len
        - $(MAX_MODEL_LEN)
        - --gpu-memory-utilization
        - $(GPU_MEMORY_UTILIZATION)
        - --served-model-name
        - $(SERVED_MODEL_NAME)
        - --enable-chunked-prefill
        - --disable-log-requests
        resources:
          requests:
            memory: "8Gi"
            cpu: "2"
            # nvidia.com/gpu: "1"  # Uncomment for GPU support
          limits:
            memory: "16Gi"
            cpu: "4"
            # nvidia.com/gpu: "1"  # Uncomment for GPU support
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: model-cache
          mountPath: /home/vllm/.cache
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: "50Gi"
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "2Gi"
      # Uncomment for GPU support
      # nodeSelector:
      #   accelerator: nvidia-tesla-k80
      # tolerations:
      # - key: nvidia.com/gpu
      #   operator: Exists
      #   effect: NoSchedule